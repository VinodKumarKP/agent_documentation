<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Background Gradient (Dark/Techy) -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Capgemini Blue to Cyan Gradient (Spade/Nodes) -->
    <linearGradient id="cg-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070AD"/>
      <stop offset="100%" stop-color="#35b8ff"/>
    </linearGradient>

    <!-- Neon Glow for the Agent "Eye/Core" -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0070AD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Optional, good for light/dark themes) -->
  <rect width="500" height="500" fill="transparent" />

  <!-- The "Orchestrator Ring" (Agent Framework / Development Kit) -->
  <g stroke="url(#cg-cyan)" stroke-width="6" fill="none" opacity="0.3">
    <circle cx="250" cy="250" r="180" stroke-dasharray="15 30"/>
    <circle cx="250" cy="250" r="210" stroke-dasharray="80 40"/>
  </g>

  <!-- Capgemini Spade Shape (Central Shield) -->
  <!-- Simplified and modernized representation -->
  <path d="M 250 80
           C 250 80, 120 180, 120 280
           C 120 340, 160 380, 220 380
           C 240 380, 250 360, 250 360
           C 250 360, 260 380, 280 380
           C 340 380, 380 340, 380 280
           C 380 180, 250 80, 250 80 Z"
        fill="url(#cg-cyan)" opacity="0.15" stroke="url(#cg-cyan)" stroke-width="4"/>

  <!-- AI / Agent Network (The "Nodes") -->
  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Central AI Core bounds -->
    <polygon points="250,180 310,215 310,285 250,320 190,285 190,215" stroke="url(#cg-cyan)" stroke-width="4" fill="rgba(0,0,0,0.5)"/>

    <!-- Internal logic connections -->
    <line x1="250" y1="180" x2="250" y2="250" />
    <line x1="190" y1="285" x2="250" y2="250" />
    <line x1="310" y1="285" x2="250" y2="250" />

    <!-- Outward orchestration connections (The "Kit") -->
    <line x1="250" y1="180" x2="250" y2="120" stroke-dasharray="10 10"/>
    <line x1="190" y1="215" x2="130" y2="180" stroke-dasharray="10 10"/>
    <line x1="310" y1="215" x2="370" y2="180" stroke-dasharray="10 10"/>
    <line x1="190" y1="285" x2="150" y2="330" stroke-dasharray="10 10"/>
    <line x1="310" y1="285" x2="350" y2="330" stroke-dasharray="10 10"/>
    <line x1="250" y1="320" x2="250" y2="370" stroke-dasharray="10 10"/>
  </g>

  <!-- Agent Core "Eye" / Center -->
  <circle cx="250" cy="250" r="25" fill="url(#glow)" filter="url(#blur-glow)" />
  <circle cx="250" cy="250" r="10" fill="#ffffff" />

  <!-- Network Nodes -->
  <!-- Inner Hexagon Nodes -->
  <circle cx="250" cy="180" r="8" fill="#35b8ff" />
  <circle cx="310" cy="215" r="8" fill="#35b8ff" />
  <circle cx="310" cy="285" r="8" fill="#35b8ff" />
  <circle cx="250" cy="320" r="8" fill="#35b8ff" />
  <circle cx="190" cy="285" r="8" fill="#35b8ff" />
  <circle cx="190" cy="215" r="8" fill="#35b8ff" />

  <!-- Outer Orchestration Nodes -->
  <circle cx="250" cy="120" r="12" fill="#000000" stroke="#00ffcc" stroke-width="3" />
  <circle cx="130" cy="180" r="12" fill="#000000" stroke="#00ffcc" stroke-width="3" />
  <circle cx="370" cy="180" r="12" fill="#000000" stroke="#00ffcc" stroke-width="3" />
  <circle cx="150" cy="330" r="12" fill="#000000" stroke="#00ffcc" stroke-width="3" />
  <circle cx="350" cy="330" r="12" fill="#000000" stroke="#00ffcc" stroke-width="3" />
  <circle cx="250" cy="370" r="12" fill="#000000" stroke="#00ffcc" stroke-width="3" />
</svg>